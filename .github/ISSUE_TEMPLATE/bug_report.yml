name: Bug report
description: Report a reproducible problem in sensorium
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please include enough detail for someone else to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host, kernel, distro, and libcamera details
      placeholder: |
        Host:
        Kernel:
        Distro:
        libcamera:
        SENSORIUM_FAMILY/SENSORIUM_SENSOR:
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands or steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and artifacts
      description: Paste relevant output from dmesg, remote logs, or validation scripts

