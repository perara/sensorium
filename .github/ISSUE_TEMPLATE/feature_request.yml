name: Feature request
description: Suggest a new capability or improvement for sensorium
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What are you trying to achieve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the feature or design you want
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: How should we test or evaluate this?

