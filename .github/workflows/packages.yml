name: Packages

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install source packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make rsync

      - name: Create source tarball
        run: make dist

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: sensorium-source
          path: dist/sensorium-*.tar.gz

  deb:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot make rsync

      - name: Build Debian package
        run: make package-deb

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: sensorium-deb
          path: dist/deb/*.deb

  alpine:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: alpine:3.20
    steps:
      - name: Install build tools
        run: |
          apk update
          apk add alpine-sdk bash git rsync tar

      - uses: actions/checkout@v4

      - name: Render package templates and dist tarball
        run: make dist package-meta

      - name: Prepare abuild key
        run: |
          getent group abuild >/dev/null 2>&1 || addgroup -S abuild
          id -u builder >/dev/null 2>&1 || adduser -D builder
          adduser builder abuild >/dev/null 2>&1 || true
          mkdir -p /home/builder/.abuild
          chown -R builder:builder /home/builder
          su builder -c 'abuild-keygen -a -n -q'
          cp /home/builder/.abuild/*.rsa.pub /etc/apk/keys/

      - name: Build Alpine package
        run: |
          ver="$(cat VERSION)"
          mkdir -p /home/builder/pkgsrc
          cp "dist/sensorium-${ver}.tar.gz" /home/builder/pkgsrc/
          cp dist/pkgmeta/alpine/* /home/builder/pkgsrc/
          chown -R builder:builder /home/builder/pkgsrc
          if ! su builder -c 'cd /home/builder/pkgsrc && abuild checksum && PACKAGER="Sensorium contributors <sensorium-bot@users.noreply.github.com>" abuild -r'; then
            find /home/builder/packages -type f -name "*.apk" -print
            test -n "$(find /home/builder/packages -type f -name "*.apk" -print -quit)"
          fi

      - name: Upload Alpine package
        uses: actions/upload-artifact@v4
        with:
          name: sensorium-apk
          path: /home/builder/packages/**/*.apk

  arch:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build tools
        run: pacman -Syu --noconfirm git python rsync tar

      - uses: actions/checkout@v4

      - name: Render package templates and dist tarball
        run: make dist package-meta

      - name: Build Arch package
        run: |
          id -u builder >/dev/null 2>&1 || useradd -m builder
          ver="$(cat VERSION)"
          mkdir -p /home/builder/pkgsrc
          cp "dist/sensorium-${ver}.tar.gz" /home/builder/pkgsrc/
          cp dist/pkgmeta/arch/* /home/builder/pkgsrc/
          chown -R builder:builder /home/builder/pkgsrc
          if ! su builder -c 'cd /home/builder/pkgsrc && makepkg --noconfirm --nodeps -f'; then
            find /home/builder/pkgsrc -maxdepth 1 -type f -name "*.pkg.tar.*" -print
            test -n "$(find /home/builder/pkgsrc -maxdepth 1 -type f -name "*.pkg.tar.*" -print -quit)"
          fi

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: sensorium-arch
          path: /home/builder/pkgsrc/*.pkg.tar.*

  publish-release-assets:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'release'
    needs:
      - source
      - deb
      - alpine
      - arch
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/sensorium-source/**
            release-artifacts/sensorium-deb/**
            release-artifacts/sensorium-apk/**
            release-artifacts/sensorium-arch/**
          generate_release_notes: true
