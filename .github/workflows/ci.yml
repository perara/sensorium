name: CI

on:
  push:
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            git \
            libcamera-dev \
            linux-headers-generic \
            pkg-config \
            ripgrep \
            shellcheck

      - name: Run repository checks
        run: make check

      - name: Build helper tools
        run: make tools

      - name: Build kernel module
        run: |
          KDIR="$(ls -d /usr/src/linux-headers-*generic 2>/dev/null | grep -v -- '-common$' | sort | tail -n1)"
          test -n "${KDIR}"
          echo "Using KDIR=${KDIR}"
          make module KDIR="${KDIR}"
