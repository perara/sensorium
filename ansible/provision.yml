---
- name: Provision Sensorium droplet
  hosts: all
  gather_facts: false
  vars:
    remote_repo_dir: "{{ lookup('env', 'REMOTE_REPO_DIR') | default('/opt/sensorium', true) }}"
    base_packages:
      - bc
      - bison
      - build-essential
      - ccache
      - cpio
      - curl
      - dwarves
      - ffmpeg
      - flex
      - git
      - kmod
      - libcamera-dev
      - libcamera-ipa
      - libcamera-tools
      - libcamera-v4l2
      - libelf-dev
      - libssl-dev
      - make
      - meson
      - ninja-build
      - pkg-config
      - python3
      - python3-apt
      - python3-pip
      - rsync
      - sudo
      - v4l-utils

  pre_tasks:
    - name: Ensure Python is present for Ansible
      raw: test -e /usr/bin/python3 || (apt-get update && apt-get install -y python3 python3-apt)
      changed_when: false

    - name: Gather facts
      setup:

  tasks:
    - name: Refresh apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: "{{ base_packages }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a

    - name: Install matching kernel headers
      apt:
        name:
          - "linux-headers-{{ ansible_facts.kernel }}"
          - "linux-modules-extra-{{ ansible_facts.kernel }}"
        state: present
      register: matching_headers
      ignore_errors: true
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a

    - name: Install generic kernel headers fallback
      apt:
        name:
          - linux-headers-generic
          - linux-image-generic
          - linux-modules-extra-generic
        state: present
      when: matching_headers is failed
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a

    - name: Ensure remote repo directory exists
      file:
        path: "{{ remote_repo_dir }}"
        state: directory
        mode: "0755"

    - name: Check for active kernel build tree
      stat:
        path: "/lib/modules/{{ ansible_facts.kernel }}/build"
      register: kernel_build_tree

    - name: Report kernel build tree status
      debug:
        msg:
          - "Kernel release: {{ ansible_facts.kernel }}"
          - "Kernel build tree present: {{ kernel_build_tree.stat.exists }}"
          - "Repo directory: {{ remote_repo_dir }}"
          - "If linux-image-generic was newly installed, reboot the droplet before loading modules."
