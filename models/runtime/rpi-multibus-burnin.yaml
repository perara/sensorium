name: rpi-multibus-burnin
schema_version: 2
adapter: runtime
runtime:
  buses:
    - id: i2c-main
      transport: i2c
      name: i2c-1
    - id: i2c-aux
      transport: i2c
      name: i2c-2
    - id: spi-main
      transport: spi
      name: spi0
    - id: spi-aux
      transport: spi
      name: spi1
    - id: uart-main
      transport: uart
      name: uart0
  devices:
    - id: env-bme280
      bus: i2c-main
      transport: i2c
      address: 0x76
      backend:
        kind: template
        template: i2c-register-bank
        size: 256
        pointer_width: 1
        auto_increment: true
        registers:
          0x10: 0x23
          0x20: 0x34
          0x21: 0x12
        clear_on_read:
          - 0x21
        write_effects:
          0x10:
            0x22: 0x99
    - id: env-bme680
      bus: i2c-main
      transport: i2c
      address: 0x77
      backend:
        kind: template
        template: i2c-register-bank
        size: 256
        pointer_width: 1
        auto_increment: true
        registers:
          0x10: 0x45
          0x30: 0x78
          0x31: 0x56
    - id: env-sht31
      bus: i2c-main
      transport: i2c
      address: 0x60
      backend:
        kind: template
        template: i2c-register-bank
        size: 256
        pointer_width: 1
        auto_increment: true
        registers:
          0x10: 0x67
          0x40: 0x89
    - id: env-iaq
      bus: i2c-main
      transport: i2c
      address: 0x61
      backend:
        kind: template
        template: i2c-register-bank
        size: 256
        pointer_width: 1
        auto_increment: true
        registers:
          0x10: 0x8a
          0x50: 0xbc
    - id: env-light
      bus: i2c-aux
      transport: i2c
      address: 0x52
      backend:
        kind: template
        template: i2c-register-bank
        size: 256
        pointer_width: 1
        auto_increment: true
        registers:
          0x01: 0xaa
          0x02: 0xbb
    - id: env-power
      bus: i2c-aux
      transport: i2c
      address: 0x53
      backend:
        kind: template
        template: i2c-register-bank
        size: 256
        pointer_width: 1
        auto_increment: true
        registers:
          0x01: 0x55
          0x02: 0x66
    - id: flash-spi0
      bus: spi-main
      transport: spi
      chip_select: 0
      device_name: spidev0.0
      settings:
        mode: 0
        bits_per_word: 8
        max_speed_hz: 500000
      backend:
        kind: template
        template: spi-script
        flash_jedec_id: "ef4018"
        flash_status_register: 0x1c
        flash_write_busy_cycles: 2
        default_response: ""
        echo: true
    - id: flash-spi1
      bus: spi-main
      transport: spi
      chip_select: 1
      device_name: spidev0.1
      settings:
        mode: 3
        bits_per_word: 8
        max_speed_hz: 1000000
      backend:
        kind: template
        template: spi-script
        responses:
          "9f0000": "c22018"
        prefix_responses:
          "9f": "c22018"
        default_response: ""
        echo: true
    - id: flash-spi2
      bus: spi-aux
      transport: spi
      chip_select: 0
      device_name: spidev1.0
      settings:
        mode: 0
        bits_per_word: 8
        max_speed_hz: 2000000
      backend:
        kind: template
        template: spi-script
        responses:
          "9f0000": "204018"
        prefix_responses:
          "9f": "204018"
        default_response: ""
        echo: true
    - id: flash-spi3
      bus: spi-aux
      transport: spi
      chip_select: 1
      device_name: spidev1.1
      settings:
        mode: 1
        bits_per_word: 8
        max_speed_hz: 1500000
      backend:
        kind: template
        template: spi-script
        responses:
          "9f0000": "bf2643"
        prefix_responses:
          "9f": "bf2643"
        default_response: ""
        echo: true
    - id: console-uart0
      bus: uart-main
      transport: uart
      port_name: ttyAMA0
      settings:
        baud_rate: 115200
        data_bits: 8
        parity: none
        stop_bits: 1
        xonxoff: false
        rtscts: false
      backend:
        kind: template
        template: uart-script
        echo: true
        line_responses:
          "AT0": "PORT0\r\n"
        control_defaults:
          cts: true
          dsr: true
          cd: true
          ri: false
        cts_follows_rts: true
        carrier_follows_dtr: true
    - id: console-uart1
      bus: uart-main
      transport: uart
      port_name: ttyAMA1
      settings:
        baud_rate: 57600
        data_bits: 8
        parity: none
        stop_bits: 1
        xonxoff: false
        rtscts: false
      backend:
        kind: template
        template: uart-script
        echo: true
        line_responses:
          "AT1": "PORT1\r\n"
        control_defaults:
          cts: true
          dsr: true
          cd: true
          ri: false
    - id: console-uart2
      bus: uart-main
      transport: uart
      port_name: ttyAMA2
      settings:
        baud_rate: 19200
        data_bits: 8
        parity: none
        stop_bits: 1
        xonxoff: false
        rtscts: false
      backend:
        kind: template
        template: uart-script
        echo: true
        line_responses:
          "AT2": "PORT2\r\n"
        control_defaults:
          cts: true
          dsr: true
          cd: true
          ri: false
    - id: console-uart3
      bus: uart-main
      transport: uart
      port_name: ttyAMA3
      settings:
        baud_rate: 9600
        data_bits: 8
        parity: none
        stop_bits: 1
        xonxoff: false
        rtscts: false
      backend:
        kind: template
        template: uart-script
        echo: true
        line_responses:
          "AT3": "PORT3\r\n"
        control_defaults:
          cts: true
          dsr: true
          cd: true
          ri: false
    - id: console-uart4
      bus: uart-main
      transport: uart
      port_name: ttyAMA4
      settings:
        baud_rate: 9600
        data_bits: 8
        parity: none
        stop_bits: 1
        xonxoff: false
        rtscts: false
      backend:
        kind: template
        template: uart-script
        echo: true
        line_responses:
          "AT4": "PORT4\r\n"
        control_defaults:
          cts: true
          dsr: true
          cd: true
          ri: false
