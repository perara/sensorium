name: env-i2c
adapter: iio
transport: i2c
timing:
  update_interval_ms: 1000
faults:
  mode: none
registers: {}
config:
  transport:
    device_name: i2c-1
    address: 0x76
  iio:
    profile: environment-basic
    temperature_millic: 21500
    pressure_pascal: 101325
    temperature_step_millic: 250
    pressure_step_pascal: 120
